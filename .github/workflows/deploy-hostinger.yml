name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          printf '%s\n' "${{ secrets.HOSTINGER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

          chmod 600 ~/.ssh/hostinger_key
          chmod 644 ~/.ssh/known_hosts

      - name: Build deployment archive
        shell: bash
        run: |
          set -euo pipefail

          tar \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./vendor' \
            --exclude='./tests' \
            --exclude='./writable/cache/*' \
            --exclude='./writable/debugbar/*' \
            --exclude='./writable/logs/*' \
            --exclude='./writable/session/*' \
            --exclude='./writable/uploads/*' \
            -czf release.tar.gz .

          printf '%s' "${{ secrets.HOSTINGER_ENV_FILE }}" > hostinger.env

      - name: Upload release bundle
        shell: bash
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_APP_PATH: ${{ secrets.HOSTINGER_APP_PATH }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/hostinger_key -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "mkdir -p '$HOSTINGER_APP_PATH/.deploy'"

          scp -i ~/.ssh/hostinger_key -P "$HOSTINGER_PORT" release.tar.gz "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_APP_PATH/.deploy/release.tar.gz"
          scp -i ~/.ssh/hostinger_key -P "$HOSTINGER_PORT" hostinger.env "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_APP_PATH/.deploy/.env"

      - name: Publish release on Hostinger
        shell: bash
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_APP_PATH: ${{ secrets.HOSTINGER_APP_PATH }}
          HOSTINGER_PUBLIC_PATH: ${{ secrets.HOSTINGER_PUBLIC_PATH }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/hostinger_key -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" <<EOF
          set -euo pipefail

          APP_PATH='$HOSTINGER_APP_PATH'
          PUBLIC_PATH='$HOSTINGER_PUBLIC_PATH'

          mkdir -p "\$APP_PATH" "\$PUBLIC_PATH" "\$PUBLIC_PATH/uploads"

          tar -xzf "\$APP_PATH/.deploy/release.tar.gz" -C "\$APP_PATH"
          mv "\$APP_PATH/.deploy/.env" "\$APP_PATH/.env"

          cd "\$APP_PATH"

          composer2 install --no-dev --optimize-autoloader --no-interaction

          mkdir -p writable/cache writable/debugbar writable/logs writable/session writable/uploads public/uploads

          php spark migrate

          chmod +x deploy/hostinger/publish.sh
          APP_PATH="\$APP_PATH" PUBLIC_PATH="\$PUBLIC_PATH" bash deploy/hostinger/publish.sh

          rm -f "\$APP_PATH/.deploy/release.tar.gz"
          EOF
